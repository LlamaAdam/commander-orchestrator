name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run test suite
        # The suite is fully offline -- no Ollama, no Claude CLI, no network.
        # Every external seam is stubbed (see tests/README.md), so CI needs no
        # services or secrets.
        run: python -m pytest -q
